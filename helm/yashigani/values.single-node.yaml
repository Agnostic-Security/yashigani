# Yashigani — Single-node overlay (dev / eval / single-node k3s / kind)
#
# USAGE:
#   helm install yashigani helm/yashigani \
#     -f helm/yashigani/values.yaml \
#     -f helm/yashigani/values.single-node.yaml \
#     [--set agentBundles.letta.enabled=true ...]
#
# PURPOSE:
#   Default values.yaml is sized for a production multi-node cluster.
#   Total CPU requests in a full Tier 1 MAX install (~8500m) exceed the
#   allocatable capacity of a typical single-node VM (6000m on a 6-CPU node
#   with ~10% reserved for system pods).
#   This overlay reduces CPU requests to ~2650m total (all agent bundles on),
#   leaving ~2350m headroom on a 6-CPU single-node cluster.
#
# WHAT CHANGES:
#   - replicaCount: 2 → 1 for gateway, backoffice, policy (HPA still works)
#   - HPA minReplicas: 2 → 1 for gateway, backoffice, policy
#   - CPU requests reduced by ~50-75% across all workloads
#   - CPU limits halved to match (requests still = 50% of limits)
#   - Memory unchanged (memory is not the constraint on single-node k3s/kind)
#
# WHAT DOES NOT CHANGE:
#   - Any security context, seccomp profile, capability drop, TLS config
#   - Image tags / digests
#   - Feature flags (pii, mtls, backup, etc.)
#   - Agent bundle enable/disable decisions
#   - The values.release.yaml overlay (for production clusters, use that instead)
#
# NOTE: PodDisruptionBudgets with minAvailable: 1 require at least 1 pod to be
#   healthy at all times. With replicaCount: 1, rolling updates will be disrupted.
#   Acceptable for single-node dev/eval; use production values for HA deployments.

# ---------------------------------------------------------------------------
# Gateway — reduce to 1 replica, halve CPU
# ---------------------------------------------------------------------------
gateway:
  replicaCount: 1
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "400m"
      memory: "1024Mi"
  hpa:
    minReplicas: 1
    maxReplicas: 2

# ---------------------------------------------------------------------------
# Backoffice — reduce to 1 replica, halve CPU
# ---------------------------------------------------------------------------
backoffice:
  replicaCount: 1
