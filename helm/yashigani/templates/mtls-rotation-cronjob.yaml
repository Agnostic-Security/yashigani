{{- if .Values.mtls.enabled }}
{{- if .Values.mtls.rotation.enabled }}
{{- if not .Values.mtls.existingSecretName }}
{{- /*
  Weekly leaf-cert rotation.

  Same two-container pattern as the bootstrap Job, but:
    * `rotate-leaves` subcommand (root + intermediate stay untouched).
    * NOT a Helm hook — this is a persistent CronJob that survives
      helm upgrade. Uses the same yashigani-pki ServiceAccount so it
      inherits the RBAC on yashigani-pki-certs.
    * Pods do not hot-reload in v2.23.1; a restart (manual or HPA churn)
      is needed to pick up the new cert. Roadmap: SIGHUP reload in v2.24.
*/ -}}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: yashigani-pki-rotate
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pki
    app.kubernetes.io/component: pki-rotate
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.mtls.rotation.schedule | quote }}
  timeZone: "UTC"
  successfulJobsHistoryLimit: {{ .Values.mtls.rotation.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.mtls.rotation.failedJobsHistoryLimit }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.mtls.rotation.backoffLimit }}
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: yashigani-pki
            app.kubernetes.io/component: pki-rotate
        spec:
          restartPolicy: Never
          serviceAccountName: yashigani-pki
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: issuer
              image: "{{ include "yashigani.ownImage" (dict "registry" .Values.global.imageRegistry "owner" .Values.global.imageOwner "repo" .Values.gateway.image.repository "tag" .Values.gateway.image.tag) }}"
              imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
              securityContext:
                runAsUser: 1001
                runAsGroup: 1001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  # Seed existing CA material into the in-memory secrets-dir so
                  # rotate-leaves doesn't mint a fresh root. After retro #3aj
                  # the CA private keys live in a dedicated Secret mounted at
                  # /existing-cakeys; certs (incl. ca_root.crt, ca_intermediate.crt
                  # and prior leaf certs) live at /existing-secrets. Copy both.
                  cp /existing-secrets/*.crt /secrets/
                  # Older deployments may still have leaf .key files in the
                  # leaves Secret — preserve them but never overwrite a CA key
                  # we are about to seed from the CA-keys Secret below.
                  for f in /existing-secrets/*_client.key; do
                    [ -e "$f" ] || continue
                    cp -- "$f" /secrets/
                  done
                  cp /existing-cakeys/ca_root.key /secrets/ca_root.key
                  cp /existing-cakeys/ca_intermediate.key /secrets/ca_intermediate.key
                  # Copy manifest to a writable path — the issuer writes
                  # bootstrap_token_sha256 back into it; ConfigMap mounts are
                  # read-only. Same rationale as the bootstrap Job.
                  cp /manifest-ro/service_identities.yaml /manifest-rw/service_identities.yaml
                  exec python -m yashigani.pki.issuer \
                    --secrets-dir /secrets \
                    --manifest /manifest-rw/service_identities.yaml \
                    rotate-leaves \
                    --leaf-lifetime-days {{ .Values.mtls.leafLifetimeDays }}
              volumeMounts:
                - name: pki-certs
                  mountPath: /secrets
                - name: existing-secrets
                  mountPath: /existing-secrets
                  readOnly: true
                - name: existing-cakeys
                  mountPath: /existing-cakeys
                  readOnly: true
                - name: manifest
                  mountPath: /manifest-ro
                  readOnly: true
                - name: manifest-rw
                  mountPath: /manifest-rw
                - name: tmp
                  mountPath: /tmp
              resources:
                {{- toYaml .Values.mtls.bootstrapResources | nindent 16 }}
          containers:
            - name: applier
              image: "{{ .Values.mtls.kubectlImage.repository }}:{{ .Values.mtls.kubectlImage.tag }}"
              imagePullPolicy: {{ .Values.mtls.kubectlImage.pullPolicy }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1001
                runAsGroup: 1001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  cd /secrets
                  # Safety guard (internal pre-push review): same
                  # empty-glob protection as the bootstrap Job — refuse to
                  # apply a stub Secret if the rotator produced nothing.
                  crt_count=$(ls -1 *.crt 2>/dev/null | wc -l)
                  key_count=$(ls -1 *.key 2>/dev/null | wc -l)
                  if [ "$crt_count" -eq 0 ] || [ "$key_count" -eq 0 ]; then
                    echo "[rotate] FATAL: rotate-leaves produced no files" >&2
                    echo "[rotate] crt=$crt_count key=$key_count — aborting" >&2
                    exit 1
                  fi
                  # Retro #3aj — leaves and CA-keys live in different Secrets.
                  # rotate-leaves only re-issues per-service leaves; CA keys
                  # are unchanged. Still re-apply both Secrets so any drift
                  # converges (e.g. someone manually edited the leaves Secret).
                  mkdir -p /tmp/leaves /tmp/cakeys
                  for f in *.crt; do
                    [ -f "$f" ] || continue
                    cp -- "$f" /tmp/leaves/
                  done
                  for f in *_client.key; do
                    [ -f "$f" ] || continue
                    cp -- "$f" /tmp/leaves/
                  done
                  # A1 fix (v2.25.0 P2): bootstrap_token_sha256 + caddy_internal_hmac
                  # preservation.  The bootstrap Job already writes these extensionless
                  # files into the leaves Secret (see mtls-bootstrap-job.yaml applier).
                  # The prior rotation applier only globbed *.crt + *_client.key — so on
                  # the FIRST rotation run the kubectl-create/apply would overwrite the
                  # leaves Secret WITHOUT these two file classes, silently deleting them.
                  # Impact: Caddy HMAC verification fails immediately (HTTP 401 on every
                  # request) and _verify_bootstrap_token() fails for all services.
                  # Fix: read the current Secret values from K8s and carry them forward,
                  # exactly as the bootstrap Job does for caddy_internal_hmac on upgrade.
                  #
                  # caddy_internal_hmac — idempotent: reuse existing value.
                  existing_hmac=""
                  existing_hmac=$(kubectl get secret {{ .Values.mtls.secretName }} \
                    --namespace {{ .Release.Namespace }} \
                    -o jsonpath='{.data.caddy_internal_hmac}' 2>/dev/null \
                    | base64 -d 2>/dev/null || true)
                  if [ -n "$existing_hmac" ]; then
                    printf "%s" "$existing_hmac" > /tmp/leaves/caddy_internal_hmac
                    echo "[rotate] Carried forward caddy_internal_hmac from existing Secret."
                  else
                    echo "[rotate] WARNING: caddy_internal_hmac absent from existing Secret — rotation will leave it absent." >&2
                  fi
                  # *_bootstrap_token files — carry all of them forward from the existing Secret.
                  # Use kubectl to list keys then fetch each one by name.
                  existing_keys=$(kubectl get secret {{ .Values.mtls.secretName }} \
                    --namespace {{ .Release.Namespace }} \
                    -o jsonpath='{.data}' 2>/dev/null \
                    | tr ',' '\n' | grep -o '"[^"]*_bootstrap_token[^"]*"' | tr -d '"' || true)
                  for token_key in $existing_keys; do
                    token_val=$(kubectl get secret {{ .Values.mtls.secretName }} \
                      --namespace {{ .Release.Namespace }} \
                      -o "jsonpath={.data.${token_key}}" 2>/dev/null \
                      | base64 -d 2>/dev/null || true)
                    if [ -n "$token_val" ]; then
                      printf "%s" "$token_val" > "/tmp/leaves/${token_key}"
                      echo "[rotate] Carried forward ${token_key} from existing Secret."
                    fi
                  done
                  # ca_bundle.crt — regenerate from leaves ca_root.crt + ca_intermediate.crt
                  # (same as bootstrap Job). Required by libpq/psycopg2 consumers.
                  if [ -f /tmp/leaves/ca_root.crt ] && [ -f /tmp/leaves/ca_intermediate.crt ]; then
                    cat /tmp/leaves/ca_root.crt /tmp/leaves/ca_intermediate.crt > /tmp/leaves/ca_bundle.crt
                    echo "[rotate] ca_bundle.crt regenerated."
                  fi
                  for f in ca_root.key ca_intermediate.key; do
                    [ -f "$f" ] || continue
                    cp -- "$f" /tmp/cakeys/
                  done
                  if ls /tmp/leaves/ca_root.key /tmp/leaves/ca_intermediate.key 2>/dev/null; then
                    echo "[rotate] FATAL: CA private key leaked into leaves payload" >&2
                    exit 1
                  fi
                  cd /tmp/leaves
                  kubectl create secret generic {{ .Values.mtls.secretName }} \
                    --namespace {{ .Release.Namespace }} \
                    $(for f in *.crt *.key caddy_internal_hmac *_bootstrap_token; do [ -f "$f" ] && echo "--from-file=$f=$f"; done) \
                    --dry-run=client -o yaml \
                  | kubectl apply -n {{ .Release.Namespace }} -f -
                  cd /tmp/cakeys
                  if ls *.key 2>/dev/null | grep -q .; then
                    kubectl create secret generic {{ .Values.mtls.caKeysSecretName }} \
                      --namespace {{ .Release.Namespace }} \
                      $(for f in *.key; do [ -f "$f" ] && echo "--from-file=$f=$f"; done) \
                      --dry-run=client -o yaml \
                    | kubectl apply -n {{ .Release.Namespace }} -f -
                  fi
                  echo "[rotate] Leaf rotation complete."
              volumeMounts:
                - name: pki-certs
                  mountPath: /secrets
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                {{- toYaml .Values.mtls.bootstrapResources | nindent 16 }}
          volumes:
            - name: pki-certs
              emptyDir:
                medium: Memory
                sizeLimit: 10Mi
            - name: existing-secrets
              secret:
                secretName: {{ .Values.mtls.secretName }}
            - name: existing-cakeys
              secret:
                secretName: {{ .Values.mtls.caKeysSecretName }}
            - name: manifest
              configMap:
                name: yashigani-pki-manifest
            - name: manifest-rw
              emptyDir:
                medium: Memory
                sizeLimit: 1Mi
            - name: tmp
              emptyDir:
                sizeLimit: 10Mi
{{- end }}
{{- end }}
{{- end }}
