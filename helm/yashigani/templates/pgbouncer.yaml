{{- if .Values.pgbouncer.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-pgbouncer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.pgbouncer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-pgbouncer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-pgbouncer
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.mtls.enabled }}
      annotations:
        # Trigger rolling update when PKI Secret resourceVersion changes.
        # See gateway.yaml for full rationale.
        checksum/pki-certs: {{ lookup "v1" "Secret" .Release.Namespace .Values.mtls.secretName | default dict | dig "metadata" "resourceVersion" "" | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      # /run/secrets mount collision — see redis.yaml note.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            # YSG-RISK-008: readOnlyRootFilesystem NOT set — edoburu/pgbouncer
            # writes userlist.txt to /etc/pgbouncer/ at startup. An emptyDir
            # overlay is incompatible with the subPath config mount already in
            # place. Documented exception; deferred to v2.23.3.
            capabilities:
              drop: ["ALL"]
          ports:
            - name: pgbouncer
              containerPort: 5432
              protocol: TCP
          # exec-chain fix (9b9d2b8): pass pgbouncer.ini explicitly to edoburu entrypoint.
          # auth_type=plain (YSG-RISK-049 ACCEPTED-LOW non-KMS-only — Tiago directive 2026-05-21).
          # edoburu entrypoint writes cleartext userlist.txt from DATABASE_URL at startup.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              exec /entrypoint.sh pgbouncer /etc/pgbouncer/pgbouncer.ini
          env:
            # YSG-RISK-049 CLOSED v2.24.0 — auth_query replaces plain + userlist.txt.
            # DATABASE_URL removed: not needed under scram-sha-256 + auth_query.
            # AUTH_TYPE removed: auth_type = scram-sha-256 is now hardcoded in pgbouncer.ini.
            # PGBOUNCER_AUTH_PASSWORD_FILE: edoburu reads this file and uses its contents
            # as pgbouncer_authenticator's password for the auth_query postgres connection.
            # Sourced from yashigani-pgbouncer-auth-secret (Option C — dedicated Secret,
            # NOT merged into yashigani-postgres-secrets, per Laura C7 + Iris §7).
            # YSG-SECRETS-DIST-002 blast radius unchanged.
            - name: PGBOUNCER_AUTH_PASSWORD_FILE
              value: "/run/secrets/pgbouncer_authenticator_password"
            - name: POOL_MODE
              value: {{ .Values.pgbouncer.env.poolMode | quote }}
            - name: MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.env.maxClientConn | quote }}
            - name: DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.env.defaultPoolSize | quote }}
          {{- if .Values.mtls.enabled }}
          # mTLS mode: pg_isready cannot negotiate client-cert TLS. Fall back
          # to a plain TCP connect against 127.0.0.1 — proves the listener is
          # up; real cert-auth gets exercised on the first gateway connect.
          readinessProbe:
            exec:
              command: ["sh", "-c", "nc -w 2 127.0.0.1 5432 </dev/null >/dev/null 2>&1"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "nc -w 2 127.0.0.1 5432 </dev/null >/dev/null 2>&1"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          {{- else }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -h localhost -p 5432"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -h localhost -p 5432"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          {{- end }}
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          {{- if .Values.mtls.enabled }}
          volumeMounts:
            - name: pki-certs
              mountPath: /run/secrets
              readOnly: true
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
            # YSG-RISK-049 CLOSED v2.24.0 — auth_query credential.
            # Option C: dedicated Secret mount, not co-located in yashigani-postgres-secrets.
            # Mode 0640: readable by pgbouncer UID 70 (fsGroup: 70); inaccessible to other pods.
            - name: pgbouncer-auth-secret
              mountPath: /run/secrets/pgbouncer_authenticator_password
              subPath: pgbouncer_authenticator_password
              readOnly: true
          {{- end }}
      {{- if .Values.mtls.enabled }}
      volumes:
        - name: pki-certs
          secret:
            secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
            defaultMode: 0440
        - name: pgbouncer-config
          configMap:
            name: yashigani-pgbouncer-config
        # YSG-RISK-049 CLOSED v2.24.0 — dedicated pgbouncer authenticator Secret.
        # authSecretName: operator-override (values.yaml pgbouncer.authSecretName).
        # Default: yashigani-pgbouncer-auth-secret (auto-generated by secrets.yaml).
        # Provision instructions in secrets.yaml comment block above the Secret definition.
        - name: pgbouncer-auth-secret
          secret:
            secretName: {{ .Values.pgbouncer.authSecretName | default "yashigani-pgbouncer-auth-secret" }}
            defaultMode: 0640
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-pgbouncer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.pgbouncer.service.type }}
  selector:
    app.kubernetes.io/name: yashigani-pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: pgbouncer
      port: {{ .Values.pgbouncer.service.port }}
      targetPort: 5432
      protocol: TCP
{{- end }}
