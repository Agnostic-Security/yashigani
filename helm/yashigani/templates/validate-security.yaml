{{- /*
  LIC-006 — Security validation: enforce mtls.enabled=true in production.

  F-V232-002 — V14.4.1: enforce that external PostgreSQL connections always
  use TLS with certificate validation (verify-ca or verify-full). When
  postgres.enabled=false the operator is expected to supply a DSN via
  existingSecretName. We cannot read runtime secrets at Helm template time,
  but we CAN enforce that the operator has declared a CA certificate value
  (postgres.tls.ca) so the chart-generated DSN template uses verify-ca, not
  the insecure require mode.

  Helm template-time validation (fail function) rejects helm install/upgrade
  before any resources are created. This is the correct layer for
  configuration guard-rails: a Job hook would run after resources are
  rendered, which is too late if the operator needs to correct values.

  Additional guard: warn on global.environment unknown values to surface
  typos that could lead to unexpected behaviour in the kms/factory.py startup
  assertion (which also validates YASHIGANI_ENV at runtime).
*/ -}}

{{- /* LIC-006: block production install with mTLS disabled */ -}}
{{- if and (eq .Values.global.environment "production") (not .Values.mtls.enabled) -}}
  {{- fail "LIC-006 SECURITY VIOLATION: mtls.enabled must be true when global.environment=production. Internal mTLS is a load-bearing security control — disabling it in production removes mutual-authentication on all inter-service communication and violates the trust boundary model. Set mtls.enabled=true, or document the risk-acceptance in your risk register before overriding this guard with a patched chart." -}}
{{- end -}}

{{- /* LIC-006: warn on staging without mTLS to catch promotion mistakes */ -}}
{{- if and (eq .Values.global.environment "staging") (not .Values.mtls.enabled) -}}
  {{- fail "LIC-006 WARNING: mtls.enabled is false in staging. This is permitted but not recommended — staging should mirror production posture. If intentional, document in your risk register." -}}
{{- end -}}

{{- /*
  F-V232-002 (V14.4.1): when postgres.enabled=false (external PostgreSQL),
  require postgres.tls.ca to be set so the connecting DSN can perform
  server-certificate validation (verify-ca or verify-full).
  An unset CA means the only available fallback is sslmode=require (CERT_NONE),
  which disables server-cert validation and violates V14.4.1.
  This guard fires for production and staging environments.
*/ -}}
{{- if and (not .Values.postgres.enabled) (or (eq .Values.global.environment "production") (eq .Values.global.environment "staging")) -}}
  {{- if not ((.Values.postgres).tls).ca -}}
    {{- fail "F-V232-002 SECURITY VIOLATION: postgres.enabled=false (external PostgreSQL) but postgres.tls.ca is unset. Setting postgres.tls.ca is required so the DSN can use sslmode=verify-ca or sslmode=verify-full for server-certificate validation. sslmode=require (CERT_NONE) is not accepted — see V14.4.1. Provide the CA PEM value in postgres.tls.ca, or document the risk-acceptance in your risk register." -}}
  {{- end -}}
{{- end -}}

{{- /*
  Captain Bucket-C (INTERNAL-BEARER-001): fail production installs where
  internalBearer.value is empty AND no existingSecretName is provided.
  An empty bearer token in production means the chart cannot generate a
  stable per-install token — agents (open-webui, langflow, letta) would
  receive a freshly-randomised token on every upgrade, breaking their auth
  to the gateway on every helm upgrade.

  Operators MUST supply one of:
    --set internalBearer.value="$(openssl rand -hex 32)"          (operator-generated)
    --set internalBearer.existingSecretName=my-bearer-secret      (external secret)

  On helm upgrade of a running install: helm lookup in secrets.yaml preserves
  the existing Secret value automatically — so passing --set internalBearer.value=""
  on an UPGRADE is the dangerous case: it would regenerate a new random token and
  break all running agent bundles. This guard blocks that scenario.

  Non-production environments allow empty value for local development (auto-generate).
*/ -}}
{{- if eq .Values.global.environment "production" -}}
  {{- if and (not .Values.internalBearer.existingSecretName) (not .Values.internalBearer.value) -}}
    {{- fail "INTERNAL-BEARER-001 SECURITY VIOLATION: internalBearer.value is empty and internalBearer.existingSecretName is not set in production. Agent bundles (open-webui, langflow, letta) require a stable per-install bearer token for gateway authentication. Supply --set internalBearer.value=\"$(openssl rand -hex 32)\" or set internalBearer.existingSecretName to a pre-created K8s Secret with key yashigani_internal_bearer. On upgrade: re-supply the current token value or the existing Secret will be regenerated, breaking running agent bundles." -}}
  {{- end -}}
{{- end -}}

{{- /*
  OPA-URL-001 — Laura OBS-01: fail production/staging installs where
  gateway.env.opaUrl is empty (resolves to YASHIGANI_OPA_URL="").

  When YASHIGANI_OPA_URL is unset at runtime, openai_router.py returns
  {"allow": True, "reason": "opa_not_configured"} unconditionally — every
  request bypasses the OPA policy check. This is an authorisation control
  failure for any production deployment.

  The default value in values.yaml ("https://yashigani-policy:8181") is
  valid for in-cluster deployments where the bundled OPA sidecar is used.
  This guard only fires if the operator has explicitly overridden the value
  to an empty string (e.g. --set gateway.env.opaUrl=""), which would silently
  disable policy enforcement.

  To resolve: supply a non-empty OPA URL via:
    --set gateway.env.opaUrl="https://opa:8181/v1/data/yashigani/v1/decision"
  Or use the bundled OPA deployment (the default chart configuration).
*/ -}}
{{- if or (eq .Values.global.environment "production") (eq .Values.global.environment "staging") -}}
  {{- if not .Values.gateway.env.opaUrl -}}
    {{- fail "OPA-URL-001 SECURITY VIOLATION: gateway.env.opaUrl is empty in production/staging. When YASHIGANI_OPA_URL is unset, the gateway OPA policy check returns allow:True for every request — all policy enforcement is bypassed. Set gateway.env.opaUrl to the OPA decision endpoint, e.g. --set gateway.env.opaUrl=\"https://yashigani-policy:8181\" or use the bundled OPA deployment (default chart configuration). Do not override to an empty value in production or staging environments." -}}
  {{- end -}}
{{- end -}}
