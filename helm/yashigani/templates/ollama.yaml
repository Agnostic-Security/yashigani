# last-updated: 2026-05-19T00:00:00+01:00 (fix(helm): ollama-init Job — also triggered by agentBundles langflow/letta/openclaw — close SF-011)
# last-updated: 2026-05-17T15:45:00+01:00 (fix: ollama-init Job — busybox initContainer + NetworkPolicy ingress + egress for Job pod)
{{- if .Values.ollama.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: yashigani-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  serviceName: yashigani-ollama
  replicas: {{ .Values.ollama.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-ollama
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-ollama
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      # BUG-NEW-003 sibling: readOnlyRootFilesystem: true blocks K8s serviceaccount
      # token mount. ollama has no K8s API access requirement.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: {{ .Values.ollama.env.ollamaHost | quote }}
            - name: HOME
              value: {{ .Values.ollama.env.home | default "/data" | quote }}
            - name: OLLAMA_MODELS
              value: {{ .Values.ollama.env.ollamaModels | default "/data/models" | quote }}
            # WARMUP-001: keep models resident in VRAM indefinitely (idle-eviction disabled).
            # Cold-load penalty (37-46s) exceeds the classifier 10s timeout and Caddy write
            # timeout. -1 = never evict. Configurable via values.yaml ollama.keepAlive.
            - name: OLLAMA_KEEP_ALIVE
              value: {{ .Values.ollama.keepAlive | default "-1" | quote }}
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  {{- if .Values.ollama.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.ollama.persistence.storageClass }}
        storageClassName: {{ .Values.ollama.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.ollama.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ollama.service.type }}
  clusterIP: None
  selector:
    app.kubernetes.io/name: yashigani-ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.ollama.service.port }}
      targetPort: 11434
      protocol: TCP
{{- end }}
{{- if and .Values.ollama.enabled (or .Values.openWebui.enabled .Values.agentBundles.langflow.enabled .Values.agentBundles.letta.enabled .Values.agentBundles.openclaw.enabled) }}
---
# ollama-init Job — pulls the default LLM model so any AI workload has a
# backend on first deploy.  Runs once per helm install/upgrade when
# openWebui.enabled OR any agentBundle (langflow/letta/openclaw) is enabled.
# SF-011 fix (2026-05-19): was gated on openWebui.enabled only; agent-bundle
# installs without Open WebUI never pulled the model → HTTP 404 on all chat.
# Helm chart equivalent of the compose ollama-init service (profiles: openwebui
# langflow letta openclaw).
apiVersion: batch/v1
kind: Job
metadata:
  name: yashigani-ollama-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-ollama-init
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
  annotations:
    helm.sh/chart-version: {{ .Chart.Version | quote }}
    yashigani/ollama-model: {{ .Values.ollama.initJob.defaultModel | quote }}
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-ollama-init
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      # BUG-NEW-003 sibling: readOnlyRootFilesystem: true blocks K8s serviceaccount
      # token mount on initContainer + ollama-init container. No K8s API access needed.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-ollama
          # busybox ships wget; the ollama image does not. Pinned by digest per image-pinning SOP.
          image: "busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              until wget -q -O- http://yashigani-ollama:11434/api/tags >/dev/null 2>&1; do
                echo "waiting for yashigani-ollama:11434..."; sleep 5
              done
              echo "ollama is reachable"
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: ollama-init
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.initJob.defaultModel | quote }}
            - name: OLLAMA_MODEL_DIGEST
              value: {{ .Values.ollama.initJob.modelDigest | quote }}
            - name: OLLAMA_MIN_DISK_GIB
              value: {{ .Values.ollama.initJob.minDiskGiB | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Checking disk space on ollama volume..."
              AVAIL_KB=$(df -k /data 2>/dev/null | awk 'NR==2{print $4}')
              REQUIRED_KB=$(( ${OLLAMA_MIN_DISK_GIB:-3} * 1024 * 1024 ))
              if [ -n "$AVAIL_KB" ] && [ "$AVAIL_KB" -lt "$REQUIRED_KB" ]; then
                AVAIL_GB=$(( AVAIL_KB / 1024 / 1024 ))
                echo "WARNING: Ollama volume has only ~${AVAIL_GB} GB free (need >=${OLLAMA_MIN_DISK_GIB:-3} GB)."
                echo "Skipping model pull. Free space on the PVC and re-deploy."
                exit 0
              fi
              # SF-QWEN-001 (ordering fix): pull qwen2.5:3b FIRST, unconditionally,
              # before any digest check on the VRAM-tier primary model. A stale
              # digest on the primary must not block the agent base model pull.
              if [ "${OLLAMA_MODEL}" != "qwen2.5:3b" ]; then
                echo "Pulling required base model: qwen2.5:3b (agent/gateway dependency — SF-QWEN-001)"
                OLLAMA_HOST=http://yashigani-ollama:11434 ollama pull "qwen2.5:3b"
                echo "Base model pull complete: qwen2.5:3b"
              fi
              echo "Disk OK. Pulling ${OLLAMA_MODEL}..."
              OLLAMA_HOST=http://yashigani-ollama:11434 ollama pull "${OLLAMA_MODEL}"
              # DIGEST POLICY: default is "skip" (see values.yaml ollama.initJob.modelDigest).
              # A mismatch is a loud WARNING, never exit 1. See compose counterpart comment.
              EXPECTED_DIGEST="${OLLAMA_MODEL_DIGEST:-skip}"
              ACTUAL_DIGEST=$(OLLAMA_HOST=http://yashigani-ollama:11434 ollama list | grep "${OLLAMA_MODEL}" | awk '{print $2}')
              if [ -n "$EXPECTED_DIGEST" ] && [ "$EXPECTED_DIGEST" != "skip" ]; then
                if echo "$ACTUAL_DIGEST" | grep -q "$EXPECTED_DIGEST"; then
                  echo "Digest verified: $ACTUAL_DIGEST"
                else
                  echo "###############################################################"
                  echo "WARNING: Model digest mismatch (SOL-SC-03)"
                  echo "  Model:    ${OLLAMA_MODEL}"
                  echo "  Expected: $EXPECTED_DIGEST"
                  echo "  Actual:   $ACTUAL_DIGEST"
                  echo "This model was updated upstream. Review the change and update"
                  echo "ollama.initJob.modelDigest in values.yaml to the new digest,"
                  echo "or set it to 'skip' to silence this warning."
                  echo "Continuing with the pulled model (Job not aborted)."
                  echo "###############################################################"
                fi
              fi
              echo "Model pull complete: ${OLLAMA_MODEL}"
              # WARMUP-001: prime the pulled model into VRAM with keep_alive:-1 so the
              # first real request (classifier or route) is warm. Cold-load penalty is
              # 37-46s — exceeds both classifier 10s timeout and Caddy write timeout.
              # Non-fatal: warmup failure warns but does not fail the Job.
              echo "Warming ${OLLAMA_MODEL} into VRAM (keep_alive:-1)..."
              PAYLOAD="{\"model\":\"${OLLAMA_MODEL}\",\"prompt\":\"hi\",\"stream\":false,\"keep_alive\":-1}"
              PAYLOAD_LEN=$(printf '%s' "$PAYLOAD" | wc -c)
              {
                printf 'POST /api/generate HTTP/1.0\r\nHost: yashigani-ollama\r\nContent-Type: application/json\r\nContent-Length: %d\r\n\r\n%s' \
                  "$PAYLOAD_LEN" "$PAYLOAD"
              } >/dev/tcp/yashigani-ollama/11434 2>/dev/null && \
              cat /dev/tcp/yashigani-ollama/11434 2>/dev/null | tail -1 && \
              echo "Warmup complete: ${OLLAMA_MODEL}" || \
              echo "WARNING: warmup returned non-zero — first request may be slow (non-fatal)"
          resources:
            {{- toYaml .Values.ollama.initJob.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-yashigani-ollama-0
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
{{- end }}
