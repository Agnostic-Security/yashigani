{{- if .Values.policy.enabled }}
{{- /*
  Last updated: 2026-05-15T00:00:00+00:00 — BUG-K8S-OPA-UNREACHABLE probe fix (A3 follow-up)

  Root cause (21372bb, v2.23.4): OPA pod was started without TLS flags, so it
  served plain HTTP on port 8181. The gateway and backoffice both call OPA via
  internal_httpx_client (yashigani.pki.client), which builds a mutual-TLS
  SSLContext using the internal CA. A TLS ClientHello against a plain-HTTP
  listener fails with a connection error → gateway catches the exception and
  returns {"allow": false, "reason": "opa_unreachable"} → HTTP 403.

  Fix (21372bb): when mtls.enabled, mount the PKI leaves Secret (same Secret
  used by every other workload) at /run/secrets and pass OPA the three TLS
  flags matching the docker-compose path (EX-231-01 closure, v2.23.2):
    --tls-cert-file        /run/secrets/policy_client.crt
    --tls-private-key-file /run/secrets/policy_client.key
    --tls-ca-cert-file     /run/secrets/ca_root.crt   (Pattern A: Python ssl)

  When mtls.enabled=false, OPA runs as before (plain HTTP), matching the
  docker-compose non-TLS path.

  Secondary defect (A3 re-validate, 2026-05-15): OPA 1.16.1 applies TLS to
  BOTH the main listener (:8181) AND the diagnostic-addr (:8282) whenever
  --tls-cert-file is set. The readiness/liveness probes were using plain
  httpGet on :8282 → OPA responded with a TLS record → K8s received HTTP 400
  → liveness probe killed the pod after 5 failures (50 s) → CrashLoopBackOff.
  Confirmed by: (a) kubectl events showing "HTTP probe failed with statuscode: 400";
  (b) OPA logs showing "http: TLS handshake error from 10.244.0.1:PORT";
  (c) docker test (openpolicyagent/opa:1.16.1 + openssl) confirming :8282 serves
  TLS when --tls-cert-file is present.

  Fix (this commit): add scheme: HTTPS to readinessProbe and livenessProbe httpGet
  blocks when mtls.enabled=true. K8s kubelets do NOT verify the server certificate
  on httpGet scheme: HTTPS probes (no CA bundle is passed; the handshake completes
  and HTTP status is checked). This is intentional K8s behaviour and acceptable for
  liveness/readiness; real mTLS verification happens between gateway/backoffice and
  OPA at runtime via internal_httpx_client.

  Note: automountServiceAccountToken disabled — OPA has no K8s API calls.
*/ -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-policy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-policy
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.policy.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-policy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-policy
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.mtls.enabled }}
      annotations:
        # Roll the pod when the PKI cert Secret changes (cert rotation).
        checksum/pki-certs: {{ lookup "v1" "Secret" .Release.Namespace .Values.mtls.secretName | default dict | dig "metadata" "resourceVersion" "" | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      # OPA does not call the K8s API — disable SA token automount so the
      # token file is not available inside the pod.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: opa
          image: "{{ .Values.policy.image.repository }}:{{ .Values.policy.image.tag }}"
          imagePullPolicy: {{ .Values.policy.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - "run"
            - "--server"
            - "--addr=0.0.0.0:8181"
            - "--diagnostic-addr=0.0.0.0:8282"
            - "--log-level=error"
            {{- if .Values.mtls.enabled }}
            # mTLS: OPA serves TLS on :8181 with its own leaf cert so that
            # internal_httpx_client callers (gateway, backoffice) can complete
            # the mutual-TLS handshake. Mirrors docker-compose path (v2.23.2
            # EX-231-01 closure). ca_root.crt = Pattern A for Go/OPA as well
            # (Go x509 builds the chain from the presented cert leaf, so the
            # root anchor is sufficient here too).
            - "--tls-cert-file=/run/secrets/policy_client.crt"
            - "--tls-private-key-file=/run/secrets/policy_client.key"
            - "--tls-ca-cert-file=/run/secrets/ca_root.crt"
            # LAURA-30-001 (2026-06-14): require client cert + enforce authz policy.
            # L1 --authentication=tls: OPA rejects no-cert connections at handshake.
            # L2 --authorization=basic: evaluates data.system.authz.allow per
            #    request. system/authz.rego (in the policy ConfigMap) restricts:
            #      backoffice SPIFFE → write+read policies+data (sole OPA writer)
            #      gateway SPIFFE    → POST /v1/data/yashigani/* eval-only
            #      unauthenticated   → /health only (kubelet probe on :8282)
            #      all others        → DENY
            - "--authentication=tls"
            - "--authorization=basic"
            {{- end }}
            - "/policies"
          ports:
            - name: {{ if .Values.mtls.enabled }}https{{ else }}http{{ end }}
              containerPort: 8181
              protocol: TCP
            - name: diagnostic
              containerPort: 8282
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8282
              {{- if .Values.mtls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8282
              {{- if .Values.mtls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.policy.resources | nindent 12 }}
          volumeMounts:
            - name: policies
              mountPath: /policies/yashigani.rego
              subPath: yashigani.rego
              readOnly: true
            - name: policies
              mountPath: /policies/v1_routing.rego
              subPath: v1_routing.rego
              readOnly: true
            - name: policies
              mountPath: /policies/rbac.rego
              subPath: rbac.rego
              readOnly: true
            - name: policies
              mountPath: /policies/agents.rego
              subPath: agents.rego
              readOnly: true
            # LAURA-OPA-002 (v2.25.2): mcp.rego must be mounted here too, else
            # OPA loads /policies/ without the MCP package and every
            # data.yashigani.mcp.* decision is undefined on K8s. Mirrors the
            # compose path (../policy:/policies:ro mounts the whole dir).
            - name: policies
              mountPath: /policies/mcp.rego
              subPath: mcp.rego
              readOnly: true
            # 3.0 convergence (Iris): document.rego must be subPath-mounted too,
            # same class as LAURA-OPA-002 above. doc-OPA added document.rego to the
            # ConfigMap (configmaps.yaml) + the compose whole-dir mount, but not to
            # this K8s Deployment — without it OPA loads /policies/ without the
            # document package and every data.yashigani.document.* decision is
            # undefined on K8s (document egress-OPA would fail to find its rules).
            - name: policies
              mountPath: /policies/document.rego
              subPath: document.rego
              readOnly: true
            # 3.0 (Iris-flagged, Captain): clients_aggregate.rego must be
            # subPath-mounted too, same drift class as mcp.rego/document.rego
            # above. It is canonical + in the ConfigMap but was absent here, so
            # OPA loaded /policies/ without the clients-aggregate package and
            # every data.yashigani.clients_aggregate.* decision was undefined on
            # K8s (defined on the compose whole-dir mount — multi-runtime drift).
            - name: policies
              mountPath: /policies/clients_aggregate.rego
              subPath: clients_aggregate.rego
              readOnly: true
            # LAURA-30-001 (2026-06-14): system.authz policy required by
            # --authorization=basic. Mounted at /policies/system/authz.rego so
            # OPA loads it as package system.authz (directory path = package path).
            # ConfigMap key: system-authz.rego (hyphens allowed in CM keys, not
            # in Rego package names — the subPath target preserves the directory).
            - name: policies
              mountPath: /policies/system/authz.rego
              subPath: system-authz.rego
              readOnly: true
            {{- if .Values.mtls.enabled }}
            - name: pki-certs
              mountPath: /run/secrets
              readOnly: true
            {{- end }}
      volumes:
        - name: policies
          configMap:
            name: yashigani-policy-bundle
        {{- if .Values.mtls.enabled }}
        - name: pki-certs
          secret:
            secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-policy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-policy
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.policy.service.type }}
  selector:
    app.kubernetes.io/name: yashigani-policy
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: {{ if .Values.mtls.enabled }}https{{ else }}http{{ end }}
      port: {{ .Values.policy.service.port }}
      targetPort: 8181
      protocol: TCP
{{- end }}
