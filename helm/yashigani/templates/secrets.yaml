  name: yashigani-langflow-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
type: Opaque
data:
  # fix(helm): #140 completion — agent-bundles.yaml secretKeyRef.key is "token"
  # Upgrade-safe: lookup preserves existing token on helm upgrade.
  token: {{ if $lfToken }}{{ index $lfToken.data "token" | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
{{- end }}

