  # ARCH: CI render uses default namespace (production uses yashigani ns)
  - CKV_K8S_21
  # ARCH: read-only filesystem, per-service tmpfs exceptions documented
  - CKV_K8S_22
  # ARCH: service account token mount managed per-service
  - CKV_K8S_38
  # ARCH: image digest in tag@digest format (checkov regex expects @sha256 directly)
  - CKV_K8S_43
  - CKV_K8S_14
  # ARCH: hostPort / host network / docker socket not used
  - CKV_K8S_19
