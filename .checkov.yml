# .checkov.yml — Checkov IaC scan configuration for Yashigani Helm chart
# Last updated: 2026-05-17T00:00:00+01:00 (F-V232-004 / ASVS V12.5.1)
#
# Used by .github/workflows/helm-iac-scan.yml.
# Scope: Kubernetes workload manifests rendered by `helm template`.
#
# Per feedback_architectural_context_check.md: each group of skipped checks
# cites the compensating control or architectural reason.
#
# Note: `framework: kubernetes` is passed on the CLI in the workflow, not here,
# to ensure checkov treats the helm-render.yaml as K8s manifests correctly.
#
# Groups:
#   YSG-RISK-008 = Kyverno admission policies (cde404a) enforce at runtime
#   YSG-RISK-005 = resource limits set on all primary containers in values.yaml
#   ARCH         = deliberate architectural design decision
#   CLUSTER      = cluster-level check, not applicable to app Helm charts
#   RBAC-CLUSTER = cluster RBAC scope, not app-chart scope

skip-check:
  # YSG-RISK-008 Kyverno-enforced: privileged, privilege-escalation, capabilities, seccomp
  - CKV_K8S_16
  - CKV_K8S_20
  - CKV_K8S_23
  - CKV_K8S_25
