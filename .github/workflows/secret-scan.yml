# Last updated: 2026-05-17T00:00:00+01:00 (F-V232-003 / ASVS V10.3.4)
#
# Secret-scan CI gate — gitleaks on PR diff and full history.
#
# Closes F-V232-003 (ASVS V10.3.4): no git-history secret scanner was
# enforced in CI. The existing opengrep rule `libssl-intermediate-anchor.yml`
# covers one known regression pattern; this gate adds broad secret-class
# coverage via gitleaks.
#
# Design:
#   1. On every PR, scan the diff of commits introduced by the PR (protect
#      mode — gitleaks compares HEAD of base branch to the PR tip).
#   2. On push to release branches, scan full history from the merge-base
#      to HEAD (detect leaks introduced in the push).
#   3. Config: .gitleaks.toml at repo root (extends gitleaks default ruleset
#      with Yashigani-specific patterns + allowlist for known FPs).
#
# Action pin: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
# corresponds to v2.3.9 (latest as of 2026-05-17).
# Verified: gh api repos/gitleaks/gitleaks-action/commits/v2.3.9 --jq '.sha'
# = ff98106e4c7b2bc287b24eaf42907196329070c7
#
# gitleaks binary: bundled inside the action image — not separately pinned.
# gitleaks v8.30.1 is bundled in gitleaks-action v2.3.9.
#
# Permissions: read-only (contents: read) — no writes to repo or registry.

name: Secret Scan

on:
  push:
    branches: [main, "release/**", "v2.23.*", "2.23.x"]
  pull_request:
    branches: [main, "release/**", "v2.23.*", "2.23.x"]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # security-events: write is NOT required for gitleaks-action in non-SARIF
  # reporting mode. We use exit-code mode (fail the job) rather than SARIF
  # upload to keep permissions minimal. If SARIF upload is added later,
  # add `security-events: write` and set `upload-findings: true`.

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history required for history-mode scanning on push events.
          # On PRs, gitleaks-action uses `protect` mode which only scans the
          # PR's commits — fetch-depth: 0 is still needed so gitleaks can
          # walk back to the merge-base.
          fetch-depth: 0

      - name: Run gitleaks
        # gitleaks/gitleaks-action v2.3.9
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for the action in private-repo mode.
          # For public repos it is optional. If this repo is private and
          # gitleaks-action complains about missing license, set
          # GITLEAKS_LICENSE in repo secrets (or switch to running the binary
          # directly via a `run:` step with `docker run zricethezav/gitleaks`).
          # We leave this blank/absent so the action falls back to the free
          # public-repo behaviour — update if repo visibility changes.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml
          # baseline-path: pre-existing FP findings (SHA hashes, test-fixture
          # keys, example tokens) — only NEW findings fail CI.
          # Baseline: 2026-05-17 @ HEAD 763a434 (230 historical FPs).
          baseline-path: .gitleaks-baseline.json
          # `protect` mode scans commits introduced in a PR.
          # On push events the action automatically switches to `detect` mode
          # and scans from the push's before-SHA to HEAD.
          # `fail` is true by default — job fails if leaks found.
