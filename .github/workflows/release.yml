# Last updated: 2026-05-08T12:00:00+01:00
name: Release — SBOM, Sign & Publish

# Triggered via workflow_run AFTER 'Build & Push Images' completes successfully.
# This eliminates the race condition where the SBOM workflow would run in
# parallel with the build and attempt to attest images not yet pushed.
#
# Previously triggered on 'push: tags: v*.*.*' — that caused a parallel
# execution race with build-push.yml. The workflow_run trigger guarantees
# images are available before SBOM generation and attestation begins.
#
# This workflow:
#   1. Generates CycloneDX 1.5 SBOM + CryptoBoM (Python script)
#   2. Signs images with cosign (keyless — Fulcio + Rekor)
#   3. Attaches SBOM as a cosign attestation
#   4. Uploads SBOM + CryptoBoM as GitHub release artifacts

on:
  workflow_run:
    workflows: ['Build & Push Images']
    types: [completed]

concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write       # create release + upload assets
  packages: write       # push attestations to GHCR
  id-token: write       # OIDC token for cosign keyless signing
  attestations: write   # upload SBOM attestations to GitHub attestations store

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  release-sbom-sign:
    name: SBOM, Sign & Publish
    runs-on: ubuntu-latest
    # Only run if the upstream 'Build & Push Images' workflow succeeded.
    # If the build failed (e.g. image push error), skip SBOM attestation
    # rather than attesting a partial or missing image.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout at the commit that triggered the build workflow
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      # -----------------------------------------------------------------------
      # 2. Resolve version from tag (strip leading 'v')
      #    In workflow_run context, GITHUB_REF_NAME is the triggering workflow's
      #    branch/tag. We derive the tag from head_branch which contains the tag
      #    name when triggered by a tag push.
      # -----------------------------------------------------------------------
      - name: Resolve version
        id: version
        run: |
          # workflow_run.head_branch holds the tag name when triggered by tag push
          TAG="${{ github.event.workflow_run.head_branch }}"
          if [[ -z "${TAG}" ]] || [[ "${TAG}" != v* ]]; then
            echo "ERROR: Expected a version tag (v*.*.*) but got: '${TAG}'" >&2
            echo "This workflow should only run when triggered by a release tag push." >&2
            exit 1
          fi
          VERSION="${TAG#v}"                # e.g. 2.2.0
          echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      # -----------------------------------------------------------------------
      # 3. Set up Python for SBOM generation
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install SBOM dependencies
        run: |
          pip install --upgrade pip
          pip install "cyclonedx-bom>=4.0"

      # -----------------------------------------------------------------------
      # 4. Generate SBOM + CryptoBoM
      # -----------------------------------------------------------------------
      - name: Generate SBOM and CryptoBoM
        run: |
          python scripts/generate_sbom.py \
            --version "${{ steps.version.outputs.version }}" \
            --output-dir dist

      - name: List generated artifacts
        run: ls -lh dist/

      # -----------------------------------------------------------------------
      # 5. Install cosign
      # -----------------------------------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # -----------------------------------------------------------------------
      # 6. Log in to GHCR (needed for cosign to push signatures/attestations)
      # -----------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 7. Sign gateway image (keyless — uses OIDC token from id-token permission)
      # -----------------------------------------------------------------------
      - name: Sign gateway image
        # COSIGN_EXPERIMENTAL was removed in cosign v2; keyless is now default.
        # Env var is omitted — cosign v3 (pinned above) uses OIDC by default.
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/yashigani-gateway:${{ steps.version.outputs.version }}"
          cosign sign --yes "${IMAGE}"

      # -----------------------------------------------------------------------
      # 8. Sign backoffice image
      # -----------------------------------------------------------------------
      - name: Sign backoffice image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/yashigani-backoffice:${{ steps.version.outputs.version }}"
          cosign sign --yes "${IMAGE}"

      # -----------------------------------------------------------------------
      # 9. Attach SBOM attestation — gateway
      # -----------------------------------------------------------------------
      - name: Attach SBOM attestation (gateway)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/yashigani-gateway:${{ steps.version.outputs.version }}"
          SBOM="dist/sbom-yashigani-${{ steps.version.outputs.version }}.cdx.json"
          cosign attest --yes \
            --predicate "${SBOM}" \
            --type cyclonedx \
            "${IMAGE}"

      # -----------------------------------------------------------------------
      # 10. Attach SBOM attestation — backoffice
      # -----------------------------------------------------------------------
      - name: Attach SBOM attestation (backoffice)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/yashigani-backoffice:${{ steps.version.outputs.version }}"
          SBOM="dist/sbom-yashigani-${{ steps.version.outputs.version }}.cdx.json"
          cosign attest --yes \
            --predicate "${SBOM}" \
            --type cyclonedx \
            "${IMAGE}"

      # -----------------------------------------------------------------------
      # 11. Create GitHub release (if not already created by build-push.yml)
      #     Uses --notes-from-tag to pull from CHANGELOG / annotated tag.
      # -----------------------------------------------------------------------
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # gh release create is idempotent when the release already exists;
          # use --notes-from-tag so changelog text is pulled from the annotated tag.
          gh release create "${TAG}" \
            --title "Yashigani ${TAG}" \
            --notes-from-tag \
            --verify-tag \
          || echo "[INFO] Release already exists; uploading assets only."

      # -----------------------------------------------------------------------
      # 12. Upload SBOM and CryptoBoM as release assets
      # -----------------------------------------------------------------------
      - name: Upload SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SBOM="dist/sbom-yashigani-${{ steps.version.outputs.version }}.cdx.json"
          gh release upload "${TAG}" "${SBOM}" --clobber

      - name: Upload CryptoBoM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          CBOM="dist/cryptobom-yashigani-${{ steps.version.outputs.version }}.json"
          gh release upload "${TAG}" "${CBOM}" --clobber

      # -----------------------------------------------------------------------
      # 13. Print verification commands for the release notes / audit trail
      # -----------------------------------------------------------------------
      - name: Print verification commands
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OWNER="${{ env.OWNER }}"
          REGISTRY="${{ env.REGISTRY }}"
          cat <<EOF
          ================================================================
          Verification commands
          ================================================================

          # Verify gateway image signature
          cosign verify \\
            --certificate-identity-regexp='https://github.com/${OWNER}/.*' \\
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\
            ${REGISTRY}/${OWNER}/yashigani-gateway:${VERSION}

          # Extract SBOM from gateway attestation
          cosign verify-attestation \\
            --type cyclonedx \\
            --certificate-identity-regexp='https://github.com/${OWNER}/.*' \\
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\
            ${REGISTRY}/${OWNER}/yashigani-gateway:${VERSION} \\
            | jq '.[0].payload | @base64d | fromjson'

          ================================================================
          EOF
