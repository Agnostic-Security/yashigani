  # Nightly-only: open a GitHub issue when new CVEs appear.
  # The issue body lists the blocking CVEs found across all agent images.
  # On schedule runs only — prevents issue spam on every PR.
  nightly-cve-issue:
    name: Nightly CVE issue (if new findings)
    runs-on: ubuntu-latest
    needs: [trivy-langflow, trivy-letta, trivy-openclaw, trivy-openwebui]
    if: github.event_name == 'schedule' && failure()
    steps:
      - name: Open GitHub issue for new CVEs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Trivy agent image CVE gate failed (nightly $(date -u +%Y-%m-%d))" \
            --body "$(cat <<'BODY'
          One or more third-party agent images failed the Trivy HIGH/CRITICAL CVE gate in the nightly scan.

          Check the workflow run for per-image SARIF and JSON artifacts.

          **Action required:**
          1. Review the failing CVE IDs in the job summaries.
          2. If the CVE has a fixed version: open a PR bumping the agent image pin in \`helm/yashigani/values.yaml\` and \`docker/docker-compose.yml\`.
          3. If no fix is available and the risk is accepted: add the CVE ID to \`trivy-agent-allowlist.json\` under the relevant image key with a documented rationale and a \`review_by\` date.

          Workflow: ${{ github.workflow }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BODY
          )" \
            --label "security,agent-images" \
            --assignee "${{ github.repository_owner }}" \
            2>/dev/null || echo "Issue creation failed (label/assignee may not exist) — non-fatal"
