# Last updated: 2026-05-25T00:00:00+01:00
# Yashigani release tags are SSH-signed locally by the maintainer before push.
# This file documents the verification recipe for CI / auditors.
#
# SIGNING SCHEME: SSH-only (hardware-backed Yubikey ed25519)
# -----------------------------------------------------------------------
# Release tags are signed by the maintainer (maxine@agnosticsec.com) on
# their local machine using a hardware-backed ed25519 key held on a Yubikey.
# CI does NOT participate in signing — the Yubikey is never available to CI.
#
# Tags are signed at creation time:
#   git config gpg.format ssh
#   git config user.signingkey ~/.ssh/id_ed25519.pub
#   git tag -s v2.X.Y <commit> -m "message"
#
# The public key is committed at docs/release-signing-key.pub in
# OpenSSH allowed_signers(5) format.
#
# WHY NOT GPG:
#   The maintainer's signing key is hardware-backed (Yubikey). Software GPG
#   export is not possible. This was confirmed empirically: tag-sign.yml ran
#   a full GPG import + sign cycle (run 25682146979); private-keys-v1.d/ was
#   empty after import because GnuPG detected a smartcard stub. Git's native
#   SSH signing (gpg.format=ssh, available since git 2.34) is the correct
#   approach for hardware-backed keys and requires no additional infrastructure.
#   GPG path removed 2026-05-25 per Tiago directive "Declare SSH-only".
#
# VERIFICATION RECIPE (for auditors, downstream consumers, CI):
# -----------------------------------------------------------------------
#
#   git config gpg.ssh.allowedSignersFile docs/release-signing-key.pub
#   git tag -v v2.24.2
#   # Expected output:
#   # Good "git" signature for maxine@agnosticsec.com with ED25519 key SHA256:y5RP8TQfAFKBECUDgqP300d8CrdY4njSRS8HzxIQdJE
#
# KEY ROTATION:
#   See docs/security/release-signing.md for the full rotation procedure.
#
# This file is kept in .github/workflows/ so that CI workflows and tooling
# that inspect the workflow directory can discover the verification recipe.
# It does NOT define an active workflow job (no `on:` trigger).
#
# Full documentation: docs/security/release-signing.md
