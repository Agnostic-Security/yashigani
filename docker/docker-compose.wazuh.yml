# Yashigani v2.25.1 — Wazuh Docker-runtime + full-mTLS OVERLAY
#
# Delta overlay for the wazuh services DEFINED IN docker-compose.yml (profile: wazuh).
# Does NOT re-declare those services wholesale (that duplicated security_opt/volumes on
# merge) — it only ADDS what main is missing to run securely on Docker 29.x:
#   - minimal caps: the wazuh s6 entrypoint must chown/setuid to the wazuh user and
#     (manager) chroot analysisd — incompatible with a bare cap_drop:[ALL].
#   - non-fatal cont-init (0-wazuh-init): Docker 29 per-subdir volume-mount readiness race.
#   - filebeat→indexer certs: main references SSL_CERTIFICATE paths it never mounts.
#   - code-based healthchecks: `curl -sf` fails on the 503/401 a security-enabled indexer
#     returns, falsely reporting unhealthy and deadlocking dependents.
#   - wazuh-security-init: one-shot securityadmin (the indexer doesn't self-init under Docker).
#   - full internal-CA mTLS: indexer HTTP listener on the internal CA (SAN wazuh-indexer) so
#     filebeat `full` verification works; transport stays demo (single node).
#
# Apply: docker compose -f docker-compose.yml -f docker-compose.wazuh.yml --profile wazuh up -d
#
# The ./wazuh-mtls/* mounts (opensearch.yml, internal_users.yml with the real generated
# password hashes, internal-CA HTTP cert, admin cert, dashboard config) are generated at
# install time — see install.sh wazuh provisioning. ./secrets/* and ./wazuh-patch/* are
# committed/install-generated.

services:

  wazuh-indexer:
    # s6/OpenSearch entrypoint drops root→wazuh-indexer(1000): needs chown/setuid caps.
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, FSETID, SETGID, SETUID, KILL]
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200 -o /dev/null -w '%{http_code}' | grep -qE '^(200|401|403)$'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 150s
    volumes:
      # internal-CA HTTP listener + real-password internal_users (transport stays demo)
      - ./wazuh-mtls/opensearch.yml:/usr/share/wazuh-indexer/config/opensearch.yml:ro
      - ./wazuh-mtls/opensearch-security/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml:ro
      - ./wazuh-mtls/certs/http-indexer.pem:/usr/share/wazuh-indexer/config/certs/http-indexer.pem:ro
      - ./wazuh-mtls/certs/http-indexer-key.pem:/usr/share/wazuh-indexer/config/certs/http-indexer-key.pem:ro
      - ./wazuh-mtls/certs/http-ca-bundle.pem:/usr/share/wazuh-indexer/config/certs/http-ca-bundle.pem:ro

  # One-shot OpenSearch security-index initialiser (securityadmin) using the internal-CA
  # admin cert. Manager/dashboard gate on its successful completion.
  wazuh-security-init:
    image: docker.io/wazuh/wazuh-indexer:4.14.5@sha256:bcba58b3fe756114249b8834bcae8f852d277ffc6b9695d3de5989f5fe94d36c
    restart: "no"
    depends_on:
      wazuh-indexer:
        condition: service_started
    volumes:
      - ./wazuh-mtls/certs/wazuh-admin.pem:/cfg/wazuh-admin.pem:ro
      - ./wazuh-mtls/certs/wazuh-admin-key.pem:/cfg/wazuh-admin-key.pem:ro
      - ./wazuh-mtls/certs/http-ca-bundle.pem:/cfg/http-ca-bundle.pem:ro
      # the REAL-password security config dir (incl. internal_users.yml with the
      # generated admin/kibanaserver hashes) — securityadmin applies THIS, not the image demo.
      - ./wazuh-mtls/opensearch-security:/cfg/opensearch-security:ro
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -eu
        echo "[security-init] waiting for indexer TLS listener ..."
        until curl -sk https://wazuh-indexer:9200 -o /dev/null; do sleep 5; done
        echo "[security-init] applying real-password security config via internal-CA admin cert ..."
        JAVA_HOME=/usr/share/wazuh-indexer/jdk \
          /usr/share/wazuh-indexer/plugins/opensearch-security/tools/securityadmin.sh \
          -cd /cfg/opensearch-security -icl -nhnv \
          -cacert /cfg/http-ca-bundle.pem \
          -cert /cfg/wazuh-admin.pem -key /cfg/wazuh-admin-key.pem \
          -h wazuh-indexer -p 9200
        echo "[security-init] done."
    networks: [obs]
    profiles: [wazuh]

  wazuh-manager:
    environment:
      # full verification now that the indexer presents the internal-CA cert (SAN wazuh-indexer)
      FILEBEAT_SSL_VERIFICATION_MODE: full
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
    # s6 entrypoint: chown/setuid to wazuh(999) + chroot analysisd into /var/ossec.
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, FSETID, SETGID, SETUID, KILL, SETPCAP, SYS_CHROOT]
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-security-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "/var/ossec/bin/wazuh-control status | grep -q 'wazuh-analysisd is running'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    volumes:
      - ./wazuh-patch/0-wazuh-init:/etc/cont-init.d/0-wazuh-init
      - ./secrets/wazuh-manager_client.crt:/etc/wazuh-indexer/certs/wazuh.manager.pem:ro
      - ./secrets/wazuh-manager_client.key:/etc/wazuh-indexer/certs/wazuh.manager-key.pem:ro
      # CA bundle (root+intermediate) so filebeat verifies the indexer's internal-CA cert
      - ./wazuh-mtls/certs/http-ca-bundle.pem:/etc/ssl/root-ca.pem:ro

  wazuh-dashboard:
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, FSETID, SETGID, SETUID, KILL]
    healthcheck:
      test: ["CMD-SHELL", "curl -sk http://localhost:5601 -o /dev/null -w '%{http_code}' | grep -qE '^(200|302|401)$'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    volumes:
      - ./wazuh-mtls/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./wazuh-mtls/certs/http-ca-bundle.pem:/usr/share/wazuh-indexer/config/certs/http-ca-bundle.pem:ro
