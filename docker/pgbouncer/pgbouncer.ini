[databases]
yashigani = host=postgres port=5432 dbname=yashigani

[pgbouncer]
listen_port = 5432
listen_addr = 0.0.0.0
; ── Authentication — auth_query (YSG-RISK-049 CLOSED v2.24.0) ───────────────
; Design: iris-v240-pgbouncer-auth-query-design.md (Amendments A2+C6).
; Threat-model: laura-v240-pgbouncer-auth-query-threat-model.md — GO.
;
; auth_type = scram-sha-256: pgbouncer SCRAM-challenges the connecting client.
; auth_user = pgbouncer_authenticator: role pgbouncer uses to dial postgres
;   for the auth_query connection. Has EXECUTE on ysg_pgbouncer_get_auth only.
;   No table grants, no schema access, no application privileges.
; auth_query: pgbouncer calls ysg_pgbouncer_get_auth($1) per connecting client,
;   fetching the SCRAM-SHA-256 verifier from pg_shadow via SECURITY DEFINER
;   function. yashigani_app cleartext is NEVER on disk in this design.
; auth_dbname = yashigani: pg_shadow is a global catalog view — the function
;   exists once in the yashigani database; both pgbouncer instances use it
;   (Amendment C6 — auth_dbname = yashigani on BOTH ini files, NOT letta).
;
; pg_hba carveout for pgbouncer_authenticator (Amendment A2):
;   Tom's 10-pgbouncer-auth.sh appends a dedicated pg_hba rule ABOVE the
;   catch-all that allows pgbouncer_authenticator FROM the compose `data`
;   network CIDR (172.20.0.0/16 default) via scram-sha-256, NO clientcert.
;   This removes the shared-cert privilege-escalation path (Laura Amendment A).
;   Residual filed as YSG-RISK-050 LOW (v2.24.x hardening backlog).
;
; pgbouncer_authenticator_password storage (Option C — dedicated secret mount):
;   Credential mounted at /run/secrets/pgbouncer_authenticator_password (not
;   GID-2002 bind-mount). pgbouncer reads via PGBOUNCER_AUTH_PASSWORD_FILE env.
;   YSG-SECRETS-DIST-002 blast radius UNCHANGED — pgbouncer NOT in GID 2002.
;
; userlist.txt is GONE: edoburu does not write userlist.txt under scram-sha-256
;   + auth_query mode. auth_file removed to avoid stale pointer (Iris §5).
;
; KMS: production KMS-configured deployments inject pgbouncer_authenticator_password
;   at runtime via src/yashigani/kms/ — same gate as postgres_password.
auth_type = scram-sha-256
auth_user = pgbouncer_authenticator
auth_query = SELECT usename, passwd FROM ysg_pgbouncer_get_auth($1)
auth_dbname = yashigani

; ── Admin console — DISABLED (Laura F2, applied to yashigani-pgbouncer, YSG-RISK-049 fix) ──
; Sibling fix: letta-pgbouncer had admin_users= empty since initial design;
; yashigani-pgbouncer was missing it. edoburu default sets admin_users=$DB_USER
; (yashigani_app) — post-escape attacker could reach pgbouncer admin console.
; Empty string explicitly disables console access in pgbouncer 1.21+.
admin_users =
stats_users =
pool_mode = transaction
max_client_conn = 100
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 40
max_user_connections = 40
server_reset_query = DISCARD ALL
server_check_delay = 30
server_check_query = select 1
client_idle_timeout = 600
server_idle_timeout = 600
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
ignore_startup_parameters = extra_float_digits,search_path,lock_timeout,statement_timeout,idle_in_transaction_session_timeout
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 5

; ── Yashigani internal mTLS (v2.23.1) ─────────────────────────────────────────
; Last updated: 2026-04-27T22:20:00Z (fix: revert BUG-59-01 CA to ca_root.crt)
;
; Clients (gateway, backoffice) must present a cert signed by our internal CA.
; PgBouncer also speaks TLS to postgres (server-side), using its own client
; cert as the identity to postgres.
;
; PKI design: root → intermediate → leaf (two-tier).
;
; CA trust anchor: ca_root.crt (self-signed root), NOT ca_intermediate.crt.
; Rationale: OpenSSL's verify-ca mode requires the trust anchor to be self-signed
; OR in the system root store.  ca_intermediate.crt is signed by the root and
; cannot be used as a standalone trust anchor — OpenSSL rejects it with
; "certificate verify failed" when clients present a leaf+intermediate chain.
;
; Client/server certs are chain bundles (leaf + intermediate). OpenSSL builds:
;   leaf → intermediate (from chain bundle) → root (from ca_root.crt) → PASS.
;
; ca_root.crt is the PUBLIC ROOT CERT only (not the private key).
; Mounting the public root cert into a workload is safe and does not violate
; the design invariant — only the ROOT PRIVATE KEY must never be in a workload.
client_tls_sslmode = verify-ca
client_tls_ca_file = /run/secrets/ca_root.crt
client_tls_key_file = /run/secrets/pgbouncer_client.key
client_tls_cert_file = /run/secrets/pgbouncer_client.crt
client_tls_protocols = secure
server_tls_sslmode = verify-ca
server_tls_ca_file = /run/secrets/ca_root.crt
server_tls_key_file = /run/secrets/pgbouncer_client.key
server_tls_cert_file = /run/secrets/pgbouncer_client.crt
server_tls_protocols = secure
