# GPU overlay (Podman runtime) — wire the host NVIDIA GPU into ollama via CDI.
#
# Podman does not use the Docker `runtime: nvidia` path; it consumes CDI devices
# (nvidia.com/gpu=N) directly — which also works with the host's `no-cgroups=true`
# rootless config (verified: `podman run --device nvidia.com/gpu=1` sees the card).
# install.sh adds this overlay (instead of docker-compose.gpu.yml) when an NVIDIA GPU
# is detected on the Podman runtime. Pin a card with YSG_GPU_CDI (default all).
services:
  ollama:
    devices:
      - "${YSG_GPU_CDI:-nvidia.com/gpu=all}"
    # ROOTLESS-CDI-004: relax read_only ONLY on the podman GPU path. podman's
    # nvidia-cdi-hook is a crun createContainer hook that writes driver-lib
    # symlinks + ld.so.cache INTO the container rootfs; against the base
    # `read_only: true` it exits 1 and the container never starts (proven:
    # `podman run --read-only --device nvidia.com/gpu=1` → hook exit 1;
    # without --read-only → RTX 3060 visible). Docker's CDI doesn't need this.
    # ollama stays cap_drop:[ALL] + no-new-privileges + non-privileged.
    read_only: false
    environment:
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
