# Podman rootless overrides — applied automatically by install.sh when RUNTIME=podman
# Usage: podman compose -f docker/docker-compose.yml -f docker/docker-compose.podman-override.yml up -d
# Last updated: 2026-05-25T00:00:00+00:00 (fix(podman): BUG-NEW-002 — seccomp relative path in override; no env-var interpolation — YSG-RISK-074)
#
# P-9 healthcheck strategy (podman-healthcheck-silent-drop):
#   Podman silently drops image-baked OCI HEALTHCHECK directives when compose
#   starts a container without an explicit healthcheck: block. Docker Engine
#   inherits the image HEALTHCHECK as a fallback; Podman does not.
#   Fix: every Yashigani compose service carries an explicit healthcheck: block
#   in docker-compose.yml. podman-compose 1.5.0 translates these into
#   --healthcheck-command (and --healthcheck-interval / --timeout / --retries
#   / --start-period) at container create time. The base compose healthchecks
#   are authoritative; this override file does not duplicate them.
#   Post-compose-up wiring is verified by _podman_verify_healthchecks() in
#   install.sh (called on the Podman path only). See issue #88.
#
# Strategy:
#   - Services that run as non-root (gateway UID 1001, backoffice UID 1001):
#     use userns_mode: keep-id so host UID maps to container UID correctly.
#   - Services that run as root internally (Ollama, Postgres, Redis, Caddy, etc.):
#     do NOT use keep-id. Podman rootless maps host UID 1000 to container root
#     automatically without keep-id. Volumes work because the container runs
#     as the mapped root user.
#   - All services: label=disable to prevent SELinux/AppArmor blocking volume access.
#
# :U volume mounts are in docker-compose.podman-virtiofs-override.yml (macOS only).
# See that file and install.sh for the full split rationale
# (LINUX-SHARED-MOUNT-UID-CLOBBER regression from PR #138).
#
# EX-231-10 network topology (2026-04-29):
#   Podman compose honours the four-network topology from docker-compose.yml
#   (edge, caddy_internal, data, obs) without modification. Podman uses
#   netavark + aardvark-dns for user-defined networks in rootless mode — the
#   DNS scoping rules are identical to Docker (names only resolve on shared
#   networks), so the isolation model holds.
#   No network: overrides are needed here; the base compose file's assignments
#   apply to both runtimes.

services:
  # --- Non-root services (UID 1001) ---
  # Do NOT use keep-id: it maps host UID 1000 to container UID 1000,
  # but these images run as UID 1001 (yashigani user). Without keep-id,
  # Podman rootless maps host UID 1000 to container root, and the
  # container's internal USER directive switches to UID 1001 normally.
  gateway:
    security_opt:
      # BUG-NEW-002 / YSG-RISK-074 (v2.24.3): seccomp path handling.
      # podman-compose 1.5.0 MERGES security_opt lists from override files (not replace).
      # The base compose carries: no-new-privileges:true, seccomp=${YASHIGANI_SECCOMP_PROFILE:-...},
      # apparmor=${YASHIGANI_APPARMOR_PROFILE:-...}.
      # This override adds label=disable (for SELinux on RHEL/Fedora Linux Podman hosts).
      # install.sh sets YASHIGANI_SECCOMP_PROFILE to an absolute path (install.sh:1993-1998)
      # and YASHIGANI_APPARMOR_PROFILE=unconfined for Podman. The absolute-path form is
      # passed directly to `podman run --security-opt seccomp=/abs/path` which Podman
      # resolves correctly (both Mac/Podman VirtioFS mount and Linux Podman native).
      # Note: if podman-compose 1.5.0 produces ENAMETOOLONG on a specific host, override
      # YASHIGANI_SECCOMP_PROFILE=unconfined in the .env file to disable the profile.
      # YSG-RISK-074.
      - label=disable

  backoffice:
    security_opt:
      # Same as gateway above — see BUG-NEW-002 / YSG-RISK-074 comment.
      - label=disable
    # Parity with docker-compose.yml: YASHIGANI_AGENT_UPSTREAM_HOSTNAMES must be
    # set on both runtimes so the SSRF guard permits canonical bundle registrations
    # on Podman rootless (Compose service names resolve via aardvark-dns, same as
    # Docker's embedded DNS). Value must match docker-compose.yml exactly.
    environment:
      YASHIGANI_AGENT_UPSTREAM_HOSTNAMES: "langflow,letta,openclaw"

  # --- Root-running services — NO keep-id ---
  policy:
    security_opt:
      - label=disable

  redis:
    security_opt:
      - label=disable

  ollama:
    security_opt:
      - label=disable
    # OLLAMA_MODELS + HOME env overrides removed: the main compose now mounts
    # ollama_data at /root/.ollama directly (the standard ollama-in-container
    # path), so defaults work without env redirection. Earlier override here
    # set env without moving the volume mount, which caused model partials to
    # try to write to a tmpfs at /root/.ollama (8MB) → no-space-left.

  ollama-init:
    security_opt:
      - label=disable

  prometheus:
    security_opt:
      - label=disable

  grafana:
    security_opt:
      - label=disable

  caddy:
    security_opt:
      - label=disable

  postgres:
    security_opt:
      - label=disable

  pgbouncer:
    security_opt:
      - label=disable

  alertmanager:
    security_opt:
      - label=disable

  loki:
    security_opt:
      - label=disable

  promtail:
    security_opt:
      - label=disable
    # FINDING-5 fix (3.1.1): Podman rootless uses journald log driver.
    # docker-compose.podman-init-deps.yml resets the Docker-specific volumes
    # (/var/lib/docker/containers, /var/run/docker.sock, docker promtail.yml)
    # and the promtail-disabled profile. This block re-adds:
    #   - journald-compatible volumes (system journal + machine-id)
    #   - retained volumes (secrets, positions)
    #   - promtail-podman.yml config (journald scrape, no docker_sd_configs)
    # profiles: intentionally absent — promtail is active on Podman path.
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      # Promtail-Podman config (journald scrape — replaces docker_sd_configs).
      - ../config/promtail/promtail-podman.yml:/etc/promtail/promtail.yml:ro
      # System journal: Podman uses journald log driver; container logs appear
      # here with CONTAINER_NAME / CONTAINER_ID_FULL journal fields.
      # /var/log/journal/<machine-id>/ has group:adm:r-x ACL; rootless Podman
      # maps container-root to host UID 1000 (max, in adm group) — readable.
      - /var/log/journal:/var/log/journal:ro
      # machine-id: required by the journald client library to identify the host.
      - /etc/machine-id:/etc/machine-id:ro
      # PKI certs for mTLS push to Loki (same as Docker path).
      - ./secrets:/run/secrets:ro
      # Persist read positions across restarts (same named volume as Docker path).
      - promtail_positions:/var/lib/promtail

  otel-collector:
    security_opt:
      - label=disable

  jaeger:
    security_opt:
      - label=disable

  vault:
    security_opt:
      - label=disable

  open-webui:
    security_opt:
      - label=disable

  budget-redis:
    security_opt:
      - label=disable

  # ── FINDING-1 fix: re-add depends_on WITHOUT init-container entries ─────
  # docker-compose.podman-init-deps.yml (loaded before this file) resets
  # depends_on for letta, letta-pgbouncer, and wazuh-manager via !reset.
  # This block re-adds the desired deps WITH correct service_healthy conditions
  # but WITHOUT agent-db-init / wazuh-security-init, which triggered the
  # Podman 4.9.3 dep-graph error:
  #
  #   "container <init-id> depends on <svc-id> not found in input list"
  #
  # The init containers (agent-db-init, wazuh-security-init) have already run
  # sequentially before letta / wazuh-manager start; removing them from
  # --requires does not change the actual startup ordering (the init containers
  # are processed in an earlier podman-compose batch). Service_healthy is
  # preserved for the non-init deps (postgres, wazuh-indexer, gateway) so the
  # health gate still holds before dependent services start.
  # Docker path (docker-compose.yml + docker-compose.wazuh.yml) UNTOUCHED.

  letta:
    depends_on:
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      letta-pgbouncer:
        condition: service_healthy
      # agent-db-init: service_completed_successfully REMOVED.
      # Podman 4.9.3 dep-graph limitation: exited init containers in the
      # --requires chain cause fatal startup errors (see above). The init
      # container always runs before letta in podman-compose's sequential
      # batch ordering; this gate is not needed in the Podman path.

  letta-pgbouncer:
    depends_on:
      postgres:
        condition: service_healthy
      # agent-db-init: service_completed_successfully REMOVED — see letta above.

  wazuh-manager:
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      # wazuh-security-init: service_completed_successfully REMOVED.
      # Same Podman dep-graph limitation. wazuh-security-init runs its
      # securityadmin loop before wazuh-manager is scheduled; wazuh-manager
      # has its own filebeat retry logic for transient indexer unavailability.
